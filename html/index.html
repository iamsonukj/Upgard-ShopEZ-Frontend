<!DOCTYPE html>
<html>

<head>
<title>ShopEZ Home</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">ShopEZ</a>

<div>
<a href="products.html" class="btn btn-outline-light me-2">Products</a>
<a href="cart.html" class="btn btn-warning">
Cart (<span id="cartCount">0</span>)
</a>
</div>
</div>
</nav>

<!-- Hero -->
<div class="container mt-4">
<div class="p-5 text-center text-white rounded"
style="background:linear-gradient(90deg,#667eea,#764ba2);">

<h1>Welcome to ShopEZ</h1>
<p>Your one-stop online shopping store</p>

<a href="products.html" class="btn btn-light btn-lg">
Shop Now
</a>

</div>
</div>

<!-- Featured -->
<div class="container mt-5">

<h2 class="text-center mb-4">Featured Products</h2>

<div id="featuredCarousel" 
     class="carousel slide" 
     data-bs-ride="carousel" 
     data-bs-interval="2500" 
     data-bs-pause="false">

    <div class="carousel-inner" id="featuredProducts">
        <!-- JS will insert items here -->
    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#featuredCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#featuredCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-4">
© 2026 ShopEZ Store
</footer>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/products.js"></script>
<script src="../js/common.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
